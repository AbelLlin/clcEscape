<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día π-clcEscape</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ff3e3e;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* BOMBA: Centrada y con pulso */
        .bomba {
            width: 440px; 
            height: 440px;
            background: url('imagen bomba.png') no-repeat center;
            background-size: contain;
            animation: pulso 0.8s infinite alternate ease-in-out;
            margin-bottom: 10px;
        }

        @keyframes pulso {
            from { transform: scale(1); filter: drop-shadow(0 0 10px red); }
            to { transform: scale(1.1); filter: drop-shadow(0 0 30px red); }
        }

        /* PANEL: Con animación de temblor */
        .panel {
            background: #333;
            padding: 20px 40px;
            border: 4px solid #555;
            border-radius: 15px;
            text-align: center;
            box-shadow: inset 0 0 15px #000;
            width: 300px;
        }

        /* Animación de error (temblor) */
        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        h2 {
            margin: 0;
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px #000;
        }

        .inputs-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }

        input {
            width: 50px;
            height: 65px;
            font-size: 2.2rem;
            text-align: center;
            background: #000;
            color: #0f0;
            border: 2px solid #555;
            border-radius: 5px;
            text-transform: uppercase;
        }

        input:focus {
            outline: none;
            border-color: #ff3e3e;
            box-shadow: 0 0 10px #ff3e3e;
        }

        button {
            padding: 12px;
            font-size: 1.1rem;
            background: #d32f2f;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
        }

        button:active { transform: scale(0.95); }

        .mensaje { 
            margin-top: 15px; 
            font-size: 1rem;
            min-height: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="bomba" class="bomba"></div>

    <div id="panel" class="panel">
        <h2>Día π(clcEscape)</h2>
        <p style="font-size: 0.8rem; color: #bbb; margin-top: 5px;">INTRODUCE LOS 3 DÍGITOS</p>
        
        <div class="inputs-container">
            <input type="text" id="c1" maxlength="1" oninput="saltar(this, 'c2')" autocomplete="off">
            <input type="text" id="c2" maxlength="1" oninput="saltar(this, 'c3')" autocomplete="off">
            <input type="text" id="c3" maxlength="1" autocomplete="off">
        </div>

        <button onclick="verificar()">DESACTIVAR</button>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        function saltar(actual, siguienteId) {
            if (actual.value.length >= 1) {
                document.getElementById(siguienteId).focus();
            }
        }

        function verificar() {
            const d1 = "7";
            const d2 = "2";
            const d3 = "1";

            const i1 = document.getElementById('c1').value;
            const i2 = document.getElementById('c2').value;
            const i3 = document.getElementById('c3').value;
            const msg = document.getElementById('mensaje');
            const bomba = document.getElementById('bomba');
            const panel = document.getElementById('panel');

            if (i1 === d1 && i2 === d2 && i3 === d3) {
                msg.textContent = "✓ BOMBA DESARMADA CON ÉXITO";
                msg.style.color = "#0f0";
                bomba.style.animation = "none";
                bomba.style.filter = "grayscale(100%) brightness(0.5)";
                panel.classList.remove('shake');
            } else {
                msg.textContent = "× ERROR: CÓDIGO INCORRECTO";
                msg.style.color = "#ff3e3e";
                
                // Efecto de temblor
                panel.classList.remove('shake');
                void panel.offsetWidth; // Truco para reiniciar la animación
                panel.classList.add('shake');

                // Resetear campos
                document.getElementById('c1').value = "";
                document.getElementById('c2').value = "";
                document.getElementById('c3').value = "";
                document.getElementById('c1').focus();
            }
        }
    </script>
</body>
</html>
